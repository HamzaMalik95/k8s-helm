apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    nginx.ingress.kubernetes.io/configuration-snippet: |
      sub_filter '<head>' '<head> <base href="/report/">'; #add base url
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$1
  name: kube-reports
  namespace: itsystems-lab
spec:
  ingressClassName: nginx
  rules:
  - host: k8calab.medimpact.com
    http:
      paths:
      - path: /report/?(.*)
        pathType: Prefix
        backend:
          service:
           name: kube-reports
           port:
             number: 8080
  tls:
  - hosts:
    - k8calab.medimpact.com