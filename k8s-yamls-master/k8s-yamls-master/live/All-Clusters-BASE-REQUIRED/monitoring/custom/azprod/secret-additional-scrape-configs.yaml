apiVersion: v1
kind: Secret
metadata:
  name: additional-scrape-configs
  namespace: monitoring
stringData:
  additional-scrape-configs.yaml: |
    - job_name: etcd
      scheme: https
      scrape_interval: 10s
      static_configs:
      - targets: ['pv2medk8ma01.medimpact.com:2379', 'pv2medk8ma02.medimpact.com:2379', 'pv2medk8ma03.medimpact.com:2379', 'pv1medk8ma04.medimpact.com:2379', 'pv1medk8ma05.medimpact.com:2379']
      tls_config:
        ca_file: /etc/prometheus/secrets/etcd-certs/ca.crt
        cert_file: /etc/prometheus/secrets/etcd-certs/clientpeer.crt
        key_file: /etc/prometheus/secrets/etcd-certs/clientpeer.key