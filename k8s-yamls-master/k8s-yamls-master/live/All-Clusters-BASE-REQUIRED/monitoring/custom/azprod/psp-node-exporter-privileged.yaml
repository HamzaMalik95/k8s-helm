---
#privileged policy
apiVersion: policy/v1beta1
kind: PodSecurityPolicy
metadata:
  name: privileged-node-exporter
spec:
  privileged: false
  # Required to prevent escalations to root.
  allowPrivilegeEscalation: false
  # This is redundant with non-root + disallow privilege escalation,
  # but we can provide it for defense in depth.
  requiredDropCapabilities:
    - ALL
  #allowedCapabilities:
  #- SETGID
  #- SETUID
  # Allow core volume types + hostPath.
  volumes:
    - 'hostPath'
    - 'configMap'
    - 'emptyDir'
    - 'projected'
    - 'secret'
    - 'downwardAPI'
    # Assume that persistentVolumes set up by the cluster admin are safe to use.
    - 'persistentVolumeClaim'
  hostNetwork: true
  hostPorts:
  - min: 9100
    max: 9100
  hostIPC: false
  hostPID: true
  runAsUser:
    #rule: 'RunAsAny'
    rule: 'MustRunAsNonRoot'
  seLinux:
    rule: 'RunAsAny'
  supplementalGroups:
    rule: 'MustRunAs'
    ranges:
      # Forbid adding the root group.
      - min: 1
        max: 65535
  fsGroup:
    rule: 'MustRunAs'
    ranges:
      # Forbid adding the root group.
      - min: 1
        max: 65535
  readOnlyRootFilesystem: false
---
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: psp:node-exporter
  namespace: monitoring
  labels:
rules:
- apiGroups:
  - policy
  resourceNames:
  - privileged-node-exporter
  resources:
  - podsecuritypolicies
  verbs:
  - use
---
# Create RoleBinding for addons just in kube-system namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: psp:node-exporter
  namespace: monitoring
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: psp:node-exporter
subjects:
- kind: ServiceAccount
  name: node-exporter
  namespace: monitoring