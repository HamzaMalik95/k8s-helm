apiVersion: v1
kind: Secret
metadata:
  name: additional-scrape-configs
  namespace: monitoring
stringData:
  additional-scrape-configs.yaml: |
    - job_name: etcd
      scheme: https
      scrape_interval: 10s
      static_configs:
      - targets: ['10.13.103.201:2379', '10.13.103.202:2379', '10.13.103.203:2379', '10.15.103.204:2379', '10.15.103.205:2379']
      tls_config:
        ca_file: /etc/prometheus/secrets/etcd-certs/ca.crt
        cert_file: /etc/prometheus/secrets/etcd-certs/clientpeer.crt
        key_file: /etc/prometheus/secrets/etcd-certs/clientpeer.key