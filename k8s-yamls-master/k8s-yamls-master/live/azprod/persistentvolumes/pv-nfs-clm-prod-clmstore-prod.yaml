# Filename: pv-<storage type>-<namespace>-<volume name>.yaml
apiVersion: v1
kind: PersistentVolume
metadata:
  name: nfs.clm-prod.clmstore-prod
  labels: 
    volname: clm-prod.clmstore-prod
spec:
  capacity:
    storage: 2.5T
  accessModes:
    - ReadWriteMany
  mountOptions:
    - rsize=8192
    - wsize=8192
    - timeo=14
    - intr
    - vers=3
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: 10.15.130.120
    path: "/vol_pv2medvfiler4_clmstore_prod/clm_prod"
