# Filename: pv-<storage type>-<namespace>-<volume name>.yaml
apiVersion: v1
kind: PersistentVolume
metadata:
  name: nfs.mfs-uat.inform-uat-filedrop
  labels: 
    volname: mfs-uat.inform-uat-filedrop
spec:
  capacity:
    storage: 28G
  accessModes:
    - ReadWriteMany
  mountOptions:
    - rsize=8192
    - wsize=8192
    - timeo=14
    - intr
    - vers=3
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: 10.15.130.119
    path: "/vol_pv2medvfiler4_mfs_uat/qtree_inform_filedrop"
