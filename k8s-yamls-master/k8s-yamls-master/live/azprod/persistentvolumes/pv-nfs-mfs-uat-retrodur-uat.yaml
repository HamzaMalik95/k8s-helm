# Filename: pv-<storage type>-<namespace>-<volume name>.yaml
apiVersion: v1
kind: PersistentVolume
metadata:
  name: nfs.mfs-uat.retrodur-uat
  labels: 
    volname: mfs-uat.retrodur-uat
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteMany
  mountOptions:
    - rsize=8192
    - wsize=8192
    - timeo=14
    - intr
    - vers=3
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: 10.15.130.120
    path: "/vol_pv2medvfiler4_mfs_uat_retrodur/qtree_retrodur_uat"
