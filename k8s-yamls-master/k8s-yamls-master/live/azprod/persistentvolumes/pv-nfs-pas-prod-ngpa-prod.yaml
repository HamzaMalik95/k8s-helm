# Filename: pv-<storage type>-<namespace>-<volume name>.yaml
apiVersion: v1
kind: PersistentVolume
metadata:
  name: nfs.pas-prod.ngpa-prod
  labels: 
    volname: pas-prod.ngpa-prod
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteMany
  mountOptions:
    - rsize=8192
    - wsize=8192
    - timeo=14
    - intr
    - vers=3
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: 10.15.130.120
    path: "/vol_pv2medvfiler4_pas_prod_ngpa/qtree_ngpa_prod"
