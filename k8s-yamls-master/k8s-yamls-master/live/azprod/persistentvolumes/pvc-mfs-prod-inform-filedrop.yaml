# Filename pvc-<namespace>-<volume name>.yaml
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: inform-prod-filedrop
  namespace: mfs-prod
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 2T
  selector:
    matchLabels:
      volname: mfs-prod.inform-prod-filedrop
