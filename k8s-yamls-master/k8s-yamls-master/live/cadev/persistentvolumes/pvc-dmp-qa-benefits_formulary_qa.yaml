# Filename pvc-<namespace>-<volume name>.yaml
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: benefits-formulary-qa
  namespace: dmp-qa
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 5Gi
  # storageClassName: nfs
  selector:
    matchLabels:
      volname: dmp-qa.benefits-formulary-qa