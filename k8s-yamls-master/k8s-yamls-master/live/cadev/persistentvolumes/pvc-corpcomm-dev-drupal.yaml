# Filename pvc-<namespace>-<volume name>.yaml
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: k8s-drupal-test
  namespace: corpcomm-dev
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 5Gi
  ##storageClassName: nfs
  selector:
    matchLabels:
      volname: corpcomm-dev.k8s-drupal-test
