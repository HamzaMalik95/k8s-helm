---
apiVersion: v1
kind: Namespace
metadata:
  labels:
    #istio-injection: enabled
    namespace: fmp-dev
  name: fmp-dev
---
#total namespace quota
apiVersion: v1
kind: ResourceQuota
metadata:
  name: cpu-mem-limit
  namespace: fmp-dev
spec:
  hard:
    limits.cpu: 2000m
    limits.memory: 5G
    requests.cpu: 1000m
    requests.memory: 3G
---
#individual container defaults
apiVersion: v1
kind: LimitRange
metadata:
  name: cpu-mem-limit
  namespace: fmp-dev
spec:
  limits:
  - default:
      cpu: 150m
      memory: 125M
    defaultRequest:
      cpu: 50m
      memory: 100M
    type: Container
---
#default deny network policy
# apiVersion: networking.k8s.io/v1
# kind: NetworkPolicy
# metadata:
  # name: default-deny
  # namespace: fmp-dev
# spec:
  # podSelector: {}
---
#bind AD group to the management role
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: oidc:kube_dev_fmp-dev
  namespace: fmp-dev
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: medimpact:namespace-admin
subjects:
- apiGroup: rbac.authorization.k8s.io
  kind: Group
  name: Kube_dev_fmp-dev