apiVersion: apps/v1
kind: Deployment
metadata:
  name: opencve-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opencve-postgres
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 100%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: opencve-postgres
    spec:
      containers:
      - name: postgres
        image: docker-local.artifactory.medimpact.com/dockerhub/postgres:15.1
        # image: docker-local.artifactory.medimpact.com/dockerhub/postgres:15.4
        # image: docker-local.artifactory.medimpact.com/dockerhub/postgres:11.21-bullseye
        imagePullPolicy: IfNotPresent
        # lifecycle:
          # preStop:
            # exec:
              # command:
                # - /bin/sh
                # - -c
                # - sleep 10
        args:
        - -c
        - max_connections=500
        - -c
        - shared_buffers=140MB
        env:
        - name: PGDATA
          value: /var/lib/postgresql/data/db-data
        - name: POSTGRES_DB
          value: opencve
        - name:  POSTGRES_PASSWORD
          value: goodpassword
        - name:  POSTGRES_USER
          value: opencve
        ports:
        - containerPort: 5432
        resources:
          limits:
            cpu: "1000m"
            memory: "800Mi"
          requests:
            cpu: "0"
            memory: "400Mi"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - mountPath: "/var/lib/postgresql/data"
          name: postgres-data
      volumes:
      - name: postgres-data
        persistentVolumeClaim:
          claimName: opencve-postgres-data
      securityContext:
        runAsUser: 10222
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
---
kind: Service
apiVersion: v1
metadata:
  name: opencve-postgres
spec:
  publishNotReadyAddresses: true
  clusterIP: None
  selector:
    app: opencve-postgres
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432