apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: pg2-parules.pg2-parules.tcp5432
  namespace: pas-dev
spec:
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: pg2-parules
    ports:
    - port: 5432
      protocol: TCP
  podSelector:
    matchLabels:
      app: pg2-parules
  policyTypes:
  - Ingress