---
apiVersion: v1
kind: Namespace
metadata:
  name: gravitee-dev
  # annotations:
    # scheduler.alpha.kubernetes.io/defaultTolerations: '[{"Key": "kubernetes.azure.com/scalesetpriority", "Operator": "Equal", "Value": "spot", "Effect": "NoSchedule"}]'
  labels:
    pod-security.kubernetes.io/enforce: restricted
    namespace: gravitee-dev
---
#total namespace quota
apiVersion: v1
kind: ResourceQuota
metadata:
  name: cpu-mem-limit
  namespace: gravitee-dev
spec:
  hard:
    limits.cpu: 54000m
    limits.memory: 80G
    requests.cpu: 10000m
    requests.memory: 42G
---
#individual container defaults
apiVersion: v1
kind: LimitRange
metadata:
  name: cpu-mem-limit
  namespace: gravitee-dev
spec:
  limits:
  - default:
      cpu: 150m
      memory: 125M
      ephemeral-storage: 5Gi
    defaultRequest:
      cpu: 50m
      memory: 100M
      ephemeral-storage: 100Mi
    max:
      ephemeral-storage: 10Gi
    type: Container
