---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: jenkins
  namespace: jenkins
# ---
# apiVersion: rbac.authorization.k8s.io/v1
# kind: ClusterRole
# metadata:
  # name: jenkins
  # namespace: jenkins
# rules:
# - apiGroups: [""]
  # verbs: ["get", "list", "watch"]
  # resources: ["endpoints", "services", "pods"]
---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: jenkins
  namespace: jenkins
subjects:
- kind: ServiceAccount
  name: jenkins # Name is case sensitive
  namespace: jenkins
roleRef:
  kind: ClusterRole #this must be Role or ClusterRole
  name: medimpact:jenkins # this must match the name of the Role or ClusterRole you wish to bind to
  apiGroup: rbac.authorization.k8s.io
