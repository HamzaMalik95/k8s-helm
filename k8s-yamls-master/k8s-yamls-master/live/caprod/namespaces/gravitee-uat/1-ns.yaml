---
apiVersion: v1
kind: Namespace
metadata:
  name: gravitee-uat
  labels:
    istio-injection: disabled
    namespace: gravitee-uat
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/warn-version: latest
    pss-enforce: "true"
---
#total namespace quota
apiVersion: v1
kind: ResourceQuota
metadata:
  name: cpu-mem-limit
  namespace: gravitee-uat
spec:
  hard:
    limits.cpu: 54000m
    limits.memory: 48G
    requests.cpu: 10000m
    requests.memory: 28G
---
#individual container defaults
apiVersion: v1
kind: LimitRange
metadata:
  name: cpu-mem-limit
  namespace: gravitee-uat
spec:
  limits:
  - default:
      cpu: 150m
      memory: 125M
      ephemeral-storage: 5Gi
    defaultRequest:
      cpu: 50m
      memory: 100M
      ephemeral-storage: 100Mi
    max:
      ephemeral-storage: 10Gi
    type: Container
