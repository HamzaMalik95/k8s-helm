# Filename: pv-<storage type>-<namespace>-<volume name>.yaml
apiVersion: v1
kind: PersistentVolume
metadata:
  name: nfs.con-solns-uat.acc-portal-uat
  labels: 
    volname: con-solns-uat.acc-portal-uat
spec:
