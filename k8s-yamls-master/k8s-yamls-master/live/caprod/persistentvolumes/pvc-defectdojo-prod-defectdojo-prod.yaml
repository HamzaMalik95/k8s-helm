# Filename pvc-<namespace>-<volume name>.yaml
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: defectdojo-prod
  namespace: defectdojo-prod
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 160Gi
  #storageClassName: nfs
  selector:
    matchLabels:
      volname: defectdojo-prod.defectdojo-prod
