apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: api-explorer
  namespace: argocd
spec:
  destination:
    name: aks-dev-westus2-001
    namespace: apim-prod
  revisionHistoryLimit: 10
  project: apim-dev
  source:
    path: kubernetes/dev
    repoURL: https://bitbucket.medimpact.com/scm/apiman/api-explorer.git
    targetRevision: development
  syncPolicy:
    syncOptions:
      - CreateNamespace=false