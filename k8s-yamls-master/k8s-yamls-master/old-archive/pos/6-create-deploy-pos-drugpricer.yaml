apiVersion: extensions/v1beta1
kind: Deployment
metadata:
  labels:
    app: pos-drugpricer-0
  name: pos-drugpricer-0
  namespace: pos
spec:
  replicas: 4
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: pos-drugpricer
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      creationTimestamp: null
      labels:
        app: pos-drugpricer
    spec:
      containers:
      - image: drydock.medimpact.com/pos-mark-test:2
        command: ["/opt/pos/bin/DrugPricer","-c","/opt/pos/etc/DrugPricer.cfg","-s","DRUGPRICER"]
        workingDir: /opt/pos/bin
        env:
        - name: LD_LIBRARY_PATH
          value: /opt/pos/infrastructure/lib:/opt/app/oracle/product/instantclient_12_2
        - name: PYTHONPATH
          value: /opt/pos/infrastructure/python_modules/lib/python
        - name: TNS_ADMIN
          value: /opt/pos/etc
        imagePullPolicy: IfNotPresent
        name: pos-drugpricer-0
        # readinessProbe:
          # failureThreshold: 3
          # httpGet:
            # path: /
            # port: 5555
            # scheme: HTTP
          # initialDelaySeconds: 5
          # periodSeconds: 2
          # successThreshold: 1
          # timeoutSeconds: 1
        resources:
          limits:
            cpu: "200m"
            memory: "50Mi"
          requests:
            cpu: "50m"
            memory: "50Mi"
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /opt/pos/etc
          name: config
        # - mountPath: /app/secret
          # name: creds
        # - mountPath: /app/ssl/
          # name: tls
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext:
        runAsUser: 7261
      terminationGracePeriodSeconds: 30
      volumes:
      - configMap:
          defaultMode: 420
          name: pos-drugpricer-0
        name: config
---
