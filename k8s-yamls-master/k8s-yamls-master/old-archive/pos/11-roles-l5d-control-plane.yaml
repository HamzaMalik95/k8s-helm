### Service Account Controller ###
---
kind: ServiceAccount
apiVersion: v1
metadata:
  name: linkerd-controller
  namespace: pos

### Controller RBAC ###
---
kind: Role
apiVersion: rbac.authorization.k8s.io/v1beta1
metadata:
  name: linkerd-pos-controller
  namespace: pos
rules:
- apiGroups: ["extensions", "apps"]
  resources: ["daemonsets", "deployments", "replicasets", "statefulsets"]
  verbs: ["list", "get", "watch"]
- apiGroups: [""]
  resources: ["pods", "endpoints", "services", "replicationcontrollers"]
  verbs: ["list", "get", "watch"]
- apiGroups: [""]
  resources: ["namespaces"]
  resourceNames: ["pos"]
  verbs: ["list", "get", "watch"]

---
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1beta1
metadata:
  name: linkerd-pos-controller
  namespace: pos
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: linkerd-pos-controller
subjects:
- kind: ServiceAccount
  name: linkerd-controller
  namespace: pos

### Service Account Prometheus ###
---
kind: ServiceAccount
apiVersion: v1
metadata:
  name: linkerd-prometheus
  namespace: pos

### Prometheus RBAC ###
---
kind: Role
apiVersion: rbac.authorization.k8s.io/v1beta1
metadata:
  name: linkerd-pos-prometheus
  namespace: pos
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
---
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1beta1
metadata:
  name: linkerd-pos-prometheus
  namespace: pos
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: linkerd-pos-prometheus
subjects:
- kind: ServiceAccount
  name: linkerd-prometheus
  namespace: pos
### Service Account for Web ###
---
kind: ServiceAccount
apiVersion: v1
