    #  tcpKeepAlive: true
    #  compressionSupported: false
    #  instances: 0
      alpn: true

    management:
      type: mongodb
      mongodb:
        uri: mongodb://dv1medgravpoc1.medimpact.com:27017,dv1medgravpoc2.medimpact.com:27017,dv1medgravpoc3.medimpact.com:27017/gravitee-am?&connectTimeoutMS=30000&replicaSet=rs0&retryWrites=true&w=majority
        

    oauth2:
      type: mongodb
      mongodb:
        uri: mongodb://dv1medgravpoc1.medimpact.com:27017,dv1medgravpoc2.medimpact.com:27017,dv1medgravpoc3.medimpact.com:27017/gravitee-am?&connectTimeoutMS=30000&replicaSet=rs0&retryWrites=true&w=majority
        

    services:
      core:
        http:
          port: 18092
          host: localhost
          authentication:
            # authentication type to be used for the core services
            # - none : to disable authentication
            # - basic : to use basic authentication
            # default is "basic"
            type: basic
            users:
              admin: adminadmin

    jwt:
      secret: s3cR3t4grAv1t3310AMS1g1ingDftK3y
