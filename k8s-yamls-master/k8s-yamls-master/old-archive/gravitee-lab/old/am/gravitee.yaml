# Source: am/templates/api/api-configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: grav-am-management-api
  labels:
    app.kubernetes.io/name: am
    app.kubernetes.io/instance: grav-am
    app.kubernetes.io/version: 3.1.2
    app.kubernetes.io/component: "management-api"
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: am-1.0.10
data:
  gravitee.yml: |

    management:
      type: mongodb
      mongodb:
        sslEnabled: false
        socketKeepAlive: false
        uri: mongodb://dv1medgravpoc1.medimpact.com:27017,dv1medgravpoc2.medimpact.com:27017,dv1medgravpoc3.medimpact.com:27017/gravitee-am?&connectTimeoutMS=30000&replicaSet=rs0&retryWrites=true&w=majority

    oauth2:
      type: mongodb
      mongodb:
        sslEnabled: false
        socketKeepAlive: false
        uri: mongodb://dv1medgravpoc1.medimpact.com:27017,dv1medgravpoc2.medimpact.com:27017,dv1medgravpoc3.medimpact.com:27017/gravitee-am?&connectTimeoutMS=30000&replicaSet=rs0&retryWrites=true&w=majority

    services:
      core:
        http: 
          enabled: true
          port: 18093
          host: localhost
          authentication:
            type: basic
            users:
              admin: adminadmin

    # SMTP configuration used to send mails
    email:
      enabled: true 
      host: mx.medimpact.com
      subject: "[gravitee] %s"
      port: 25
      from: grav-am@medimpact.com
      username: info@example.com
      password: example.com
      properties:
        auth: false
        starttls.enable: false

    domains:
      certificates:
        default:
          keysize: 2048
          alias: default
          keypass: gravitee
          storepass: gravitee
          validity: 365
          algorithm: SHA256withRSA
          name: cn=Gravitee.io

    jwt:
      secret: s3cR3t4grAv1t3310AMS1g1ingDftK3y
      #kid: default-gravitee-AM-key
      #expire-after: 604800
      #issuer: https://gravitee.am
      #cookie-path: /
      #cookie-domain: .gravitee.io cookie domain (default "")
      #cookie-secure: true

    # User management configuration
    user:
      # Password complexity validation policy
      # Applications should enforce password complexity rules to discourage easy to guess passwords.
      # Passwords should require a minimum level of complexity that makes sense for the application and its user population.
      #password:
      #  policy:
      #    pattern: ^(?=\s*\S).*$ # Regex pattern for password validation (default to ^(?=\s*\S).*$ (non empty string))
                                  # Example : ^(?=.*[0-9])(?=.*[a-z])(?=.*[A-Z])(?=.*[@#$%^&+=])(?=\S+$).{8,}$
                                  # ^                # start-of-string
                                  #(?=.*[0-9])       # a digit must occur at least once
                                  #(?=.*[a-z])       # a lower case letter must occur at least once
                                  #(?=.*[A-Z])       # an upper case letter must occur at least once
                                  #(?=.*[@#$%^&+=])  # a special character must occur at least once
                                  #(?=\S+$)          # no whitespace allowed in the entire string
                                  #.{8,}             # anything, at least eight places though
                                  #$                 # end-of-string
      registration:
        email:
          #subject: New user registration
        token:
        #expire-after: 86400 # the end of validity of the token in seconds for registration email (default 86400 = a day)
      resetPassword:
        email:
          #subject: Please reset your password
        token:
        #expire-after: 86400 # the end of validity of the token in seconds for reset password email (default 86400 = a day)

    # Gateway entry point used in emails
    gateway:
      url: https://grav-dev-am-gw.medimpact.com
