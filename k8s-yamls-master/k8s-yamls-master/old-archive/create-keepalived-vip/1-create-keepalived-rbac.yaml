---
kind: Namespace
apiVersion: v1
metadata:
  name: keepalived-vip
---
#management role that namespace admins can be bound to
kind: Role
apiVersion: rbac.authorization.k8s.io/v1beta1
metadata:
  namespace: keepalived-vip
  name: manager
rules:
  - apiGroups: ["", "extensions", "apps"]
    resources: ["deployments", "replicasets", "pods", "services", "secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"] # You can also use ["*"]
---
#service account for the keepalived pods to use to connect to k8s api
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kube-keepalived-vip
  namespace: keepalived-vip
---
apiVersion: rbac.authorization.k8s.io/v1beta1
kind: ClusterRole
metadata:
  name: kube-keepalived-vip
rules:
  - apiGroups:
      - ""
    resources:
      - pods
      - nodes
      - endpoints
      - services
      - configmaps
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1beta1
kind: ClusterRoleBinding
metadata:
  name: kube-keepalived-vip
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kube-keepalived-vip
subjects:
  - kind: ServiceAccount
    name: kube-keepalived-vip
    namespace: keepalived-vip