apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: apim-nonprod
spec:
  description: API Management
  destinations:
  - name: aks-dev-westus2-001
    namespace: pas-dev
    server: '*'
  roles:
  - name: admin
    groups:
    - Kube_cluster-power-users
    policies:
    - p, proj:apim-nonprod:admin, applications, *, apim-nonprod/*, allow
  - name: developer
    groups:
    - Kube_dev_apim-dev
    policies:
    - p, proj:apim-nonprod:developer, applications, get, apim-nonprod/*, allow
    - p, proj:apim-nonprod:developer, applications, sync, apim-nonprod/*, allow
    - p, proj:apim-nonprod:developer, applications, update, apim-nonprod/*, allow
    - p, proj:apim-nonprod:developer, applications, action/apps/*/restart, apim-nonprod/*, allow
    - p, proj:apim-nonprod:developer, exec, create, apim-nonprod/*, allow
    - p, proj:apim-nonprod:developer, projects, get, apim-nonprod, allow
    - p, proj:apim-nonprod:developer, repositories, get, apim-nonprod/*, allow
  sourceRepos:
  - https://bitbucket.medimpact.com/scm/apiman/api-explorer.git
