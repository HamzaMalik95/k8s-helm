kind: Ingress
metadata:
  name: grav3-apim3-api-management
  labels:
    app.kubernetes.io/name: apim3
    app.kubernetes.io/instance: grav3
    app.kubernetes.io/version: 3.1.2
    app.kubernetes.io/component: "api"
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: apim3-3.0.7
  annotations:
