apiVersion: autoscaling/v2beta1
kind: HorizontalPodAutoscaler
metadata:
  name: grav3-apim3-gateway
  labels:
    app.kubernetes.io/name: apim3
    app.kubernetes.io/instance: grav3
    app.kubernetes.io/version: 3.1.2
    app.kubernetes.io/component: "gateway"
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: apim3-3.0.7
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: grav3-apim3-gateway
  minReplicas: 3
  maxReplicas: 3
  metrics:
  - type: Resource
    resource:
      name: cpu
      targetAverageUtilization: 50
  - type: Resource
    resource:
      name: memory
      targetAverageUtilization: 80
---
