      nginx.ingress.kubernetes.io/configuration-snippet: "etag on;\nproxy_pass_header ETag;\nproxy_set_header if-match \"\";\n"
spec:
  rules:
    - host: grav-dev-api.medimpact.com
      http:
        paths:
          - path: /management
            backend:
              serviceName: grav3-apim3-api
              servicePort: 83
  tls:
    - hosts:
      - grav-dev-api.medimpact.com
