      from: gravitee-apim@medimpact.com
      username: info@example.com
      password: example.com
      properties:
        auth: true
        starttls.enable: false

    # Mail templates
    templates:
      path: ${gravitee.home}/templates

    jwt:
      secret: myJWT4Gr4v1t33_S3cr3t
