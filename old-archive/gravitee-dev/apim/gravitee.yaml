apiVersion: apps/v1
kind: Deployment
metadata:
  name: gio-apim3-api
  labels:
    app.kubernetes.io/name: apim3
    app.kubernetes.io/instance: gio
    app.kubernetes.io/version: 3.5.8-mi1.0.34
    app.kubernetes.io/component: "api"
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: apim3-3.1.3
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: apim3
      app.kubernetes.io/instance: gio
      app.kubernetes.io/component: "api"
  template:
    metadata:
      annotations:
        chaos.alpha.kubernetes.io/enabled: "false"
        checksum/config: d183ea0da67348e39b9db0bd27f0f5b0b49036d744a6241127116b9720109bb2
      labels:
        app.kubernetes.io/name: apim3
        app.kubernetes.io/instance: gio
        app.kubernetes.io/component: "api"
    spec:
      containers:
        - name: gio-apim3-api
          image: "docker-local.artifactory.medimpact.com/graviteeio/apim-management-api:3.5.8-mi1.0.34"
          imagePullPolicy: IfNotPresent
          securityContext:  
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
          ports:
            - name: http
              containerPort: 8083
          env:
            - name: gravitee_jwt_cookie-domain
              value: "gio-dev.medimpact.com"
            - name: JAVA_OPTS
              value: "-Djavax.net.ssl.trustStore=/opt/graviteeio-management-api/certs/cacerts -Djavax.net.ssl.trustStorePassword=changeit"
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh","-c","sleep 10"]
          livenessProbe:
            tcpSocket:
              port: 8083
            initialDelaySeconds: 180
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: 8083
            initialDelaySeconds: 60
            periodSeconds: 10
          resources:
            limits:
              cpu: 500m
              memory: 2048Mi
            requests:
              cpu: 150m
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /opt/graviteeio-management-api/config/gravitee.yml
              subPath: gravitee.yml
            - name: config
              mountPath: /opt/graviteeio-management-api/config/logback.xml
              subPath: logback.xml            
            - name: medimpact-certs
              readOnly: true
              mountPath: /opt/graviteeio-management-api/certs
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault            
      volumes:
        - name: config
          configMap:
            name: gio-apim3-api        
        - name: medimpact-certs
          secret:
            secretName: medimpact-certs
