# Source: apim3/templates/gateway/gateway-configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: gio-apim3-gateway
  labels:
    app.kubernetes.io/name: apim3
    app.kubernetes.io/instance: gio
    app.kubernetes.io/version: 3.6.0
    app.kubernetes.io/component: "gateway"
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: apim3-3.1.3
data:
  gravitee.yml: |
  
    groovy:
      whitelist:
        mode: append
        list:
          - method org.codehaus.groovy.runtime.EncodingGroovyMethods decodeBase64 java.lang.String
          - method org.codehaus.groovy.runtime.EncodingGroovyMethods decodeBase64 java.lang.String boolean
          - class org.codehaus.groovy.runtime.EncodingGroovyMethods
          - class java.lang.String
        
        
    # Gateway HTTP server
    http:
      port: 8082
      host: 0.0.0.0
    #  idleTimeout: 0
    #  tcpKeepAlive: true
    #  compressionSupported: false
    #  instances: 0
      alpn: true
      websocket:
        enabled: false
    management:
      type: mongodb
      mongodb:
        sslEnabled: true
        socketKeepAlive: false
        uri: mongodb://adminUser:gravrules@dv1medgiocadb1.medimpact.com:27017,dv1medgiocadb2.medimpact.com:27017,dv2medgiocadb1.medimpact.com:27017/gravitee?authSource=admin&connectTimeoutMS=30000&replicaSet=rs0&retryWrites=true&w=majority&ssl=true

    ratelimit:
      type: mongodb
      mongodb:
        sslEnabled: true
        socketKeepAlive: false
        uri: mongodb://adminUser:gravrules@dv1medgiocadb1.medimpact.com:27017,dv1medgiocadb2.medimpact.com:27017,dv2medgiocadb1.medimpact.com:27017/gravitee?authSource=admin&connectTimeoutMS=30000&replicaSet=rs0&retryWrites=true&w=majority&ssl=true
    cache:
      type: ehcache
      enabled: true

    # Sharding tags configuration
    # Allows to define inclusion/exclusion sharding tags to only deploy a part of APIs. To exclude just prefix the tag with '!'.
    tags:   

    # Multi-tenant configuration
    # Allow only a single-value
    tenant:   

    # Reporters configuration (used to store reporting monitoring data, request metrics, healthchecks and others...
    # All reporters are enabled by default. To stop one of them, you have to add the property 'enabled: false'
    reporters:
      
      
      # Splunk reporter
      splunk:
        enabled: true # Is the reporter enabled or not (default to true)
        # 'hec' is HTTP Event Collector
        hec_endpoint: https://splunk.medimpact.com:8088/services/collector/event
        # in milliseconds:
        connect_timeout: 1000
        request_timeout: 2000
        # The type of info to report, along with the authorization token.
        # If it's not here it won't be reported.
        message_types:
          - type: endpoint_status
            auth: 73d5f52b-8f26-4412-8c33-b6ddaae4f1e6
          - type: log
            auth: 19a08d56-f149-4bea-b9f9-e07890e5c4fa
          - type: metrics
            auth: fb0ff98f-f937-4e65-af5f-fdfa48cf344b
          - type: monitor
            auth: 3e27164f-3c73-4767-97fa-9ea1ecf4b895
      
      
      
      
      
      # Elasticsearch reporter
      elasticsearch:
        enabled: true
        endpoints:
          - https://dv1medgioes1.medimpact.com:9200
          - https://dv1medgioes2.medimpact.com:9200
          - https://dv1medgioes3.medimpact.com:9200
        security:
          username: elastic
          password: 1bgR0hiI6DScCW6R6xSL
        index: gravitee
        bulk:
          actions: 1000           # Number of requests action before flush
          flush_interval: 5       # Flush interval in seconds

    services:
      core:
        http:
          enabled: true
          port: 18082
          host: localhost
          authentication:
            type: basic
            users:
              admin: adminadmin
          secured: false
      kubernetes:
        enabled: false
      # Synchronization daemon used to keep the gateway state in sync with the configuration from the management repository
      # Be aware that, by disabling it, the gateway will not be sync with the configuration done through management API
      # and management UI
      sync:
        # Synchronization is done each 5 seconds
        cron: '*/5 * * * * *'

      # Service used to store and cache api-keys from the management repository to avoid direct repository communication
      # while serving requests.
      apikeyscache:
        delay: 10000
        unit: MILLISECONDS
        threads: 3 # Threads core size used to retrieve api-keys from repository.

      # Local registry service.
      # This registry is used to load API Definition with json format from the file system. By doing so, you do not need
      # to configure your API using the web console or the rest API (but you need to know and understand the json descriptor
      # format to make it work....)
      local:
        enabled: false
        path: ${gravitee.home}/apis # The path to API descriptors

      # Gateway monitoring service.
      # This service retrieves metrics like os / process / jvm metrics and send them to an underlying reporting service.
      monitoring:
        delay: 5000
        unit: MILLISECONDS

      # Endpoint healthcheck service.
      healthcheck:
        threads: 3 # Threads core size used to check endpoint availability
    
    handlers:
      request:
        # manage traceparent header defined by W3C trace-context specification
        trace-context:
          enabled: true
        # possible values: hex, uuid. Default: uuid.
        format: uuid
        transaction:
          # Default: X-Gravitee-Transaction-Id.
          header: X-Gravitee-Transaction-Id
        headers:
          # Override X-Forwarded-Prefix with context path. Disabled by default.
          x-forwarded-prefix: false
        request:
          # Default: X-Gravitee-Request-Id.
          header: X-Gravitee-Request-Id
          
    # Customize the api-key header and / or query parameter.
    policy:
      api-key:
        header: X-Api-Key
        param: api-key
  logback.xml: |
    <?xml version="1.0" encoding="UTF-8"?>

    <!--
      ~ Copyright (c) 2015-2016, The Gravitee team (http://www.gravitee.io)
      ~
      ~  Licensed under the Apache License, Version 2.0 (the "License");
      ~  you may not use this file except in compliance with the License.
      ~  You may obtain a copy of the License at
      ~
      ~  http://www.apache.org/licenses/LICENSE-2.0
      ~
      ~  Unless required by applicable law or agreed to in writing, software
      ~  distributed under the License is distributed on an "AS IS" BASIS,
      ~  WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND, either express or implied.
      ~  See the License for the specific language governing permissions and
      ~  limitations under the License.
      -->

    <configuration>

        <appender name="STDOUT" class="ch.qos.logback.core.ConsoleAppender">
            <!-- encoders are assigned the type
                ch.qos.logback.classic.encoder.PatternLayoutEncoder by default -->
            <encoder>
                <!-- <pattern>%d{HH:mm:ss.SSS} [%thread] [%X{api}] %-5level %logger{36} - %msg%n</pattern> -->
                <pattern>[%d{yyyy-MM-dd'T'HH:mm:ss.SSS}] [%thread] [%X{api}] %-5level %logger{36} - %msg%n</pattern>
            </encoder>
        </appender>

        <appender name="async-console" class="ch.qos.logback.classic.AsyncAppender">
            <appender-ref ref="STDOUT" />
        </appender>

        <logger name="io.gravitee" level="INFO" />
        <logger name="org.reflections" level="WARN" />
        <logger name="org.springframework" level="WARN" />
        <logger name="org.eclipse.jetty" level="WARN" />
        <!-- <logger name="com.medimpact.gravitee.extension" level="DEBUG" />  -->
        <logger name="com.medimpact.gravitee.extension.resource.rediscache.RedisCache" level="INFO" />
        <logger name="com.medimpact.gravitee.extension.policy.rediscache.RedisCachePolicy" level="INFO" />
        <logger name="com.medimpact.gravitee.extension.policy.getrbac" level="ERROR" />
        <!-- <logger name="io.gravitee.policy.oauth2.Oauth2Policy" level="DEBUG" />  -->
        <!-- <logger name="io.gravitee.resource.oauth2.generic.OAuth2GenericResource" level="DEBUG" />  -->
        <!-- <logger name="io.gravitee.g.s.core.SecurityPolicyResolver" level="DEBUG" />  -->  

        <!-- Strictly speaking, the level attribute is not necessary since -->
        <!-- the level of the root level is set to DEBUG by default.       -->
        <root level="INFO">
            <appender-ref ref="async-console" />
        </root>

    </configuration>
---
