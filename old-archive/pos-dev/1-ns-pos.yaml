---
apiVersion: v1
kind: Namespace
metadata:
  name: pos-dev
  labels:
    istio-injection: enabled
    namespace: pos-dev
---
#total namespace quota
apiVersion: v1
kind: ResourceQuota
metadata:
  name: cpu-mem-limit
  namespace: pos-dev
spec:
  hard:
    limits.cpu: 92000m
    limits.memory: 40000M
    requests.cpu: 22000m
    requests.memory: 24000M
---
#individual container defaults
apiVersion: v1
kind: LimitRange
metadata:
  name: cpu-mem-limit
  namespace: pos-dev
spec:
  limits:
  - default:
      cpu: 150m
      memory: 125M
    defaultRequest:
      cpu: 50m
      memory: 100M
    type: Container
---
#default deny network policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: pos-dev
spec:
  podSelector: {}
---
# Allow istio prometheus to istio sidecars
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-allow-istio-telemetry
  namespace: pos-dev
spec:
  ingress:
    - from:
      - namespaceSelector:
          matchLabels:
            namespace: istio-system
        podSelector:
          matchLabels:
            app: prometheus
      ports:
      - port: 15090
        protocol: TCP
  podSelector: {}
  policyTypes:
  - Ingress
---
#bind AD group to the management role
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: oidc:kube_dev_pos-dev
  namespace: pos-dev
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: medimpact:namespace-admin
subjects:
- apiGroup: rbac.authorization.k8s.io
  kind: Group
  name: Kube_dev_pos-dev