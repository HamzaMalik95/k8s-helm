;use semi-colon for comments
[DRUGPRICER]
;ROUTER_HOST is the hostname where service router is running.
ROUTER_HOST=pos-service-router
;ROUTER_PORT is the port on which service router is running.
ROUTER_PORT=49500
;SERVICE is the name of the service which will be registered with the router.
SERVICE=DRUG_PRICER
;DATABASE to which Worker will be connected to for processing.
DATABASE=devh01
;USERNAME is the database user name.
USERNAME=posgroup
;PASSWORD is the database password.
PASSWORD=co0rdin8
;LOGFORMAT is the LOG4CPLUS format for logging.
LOGFORMAT=%D{%m%d%y|%H:%M:%S.%q}|%x|%-8p|%i|%m%n
;LOGLEVEL is the LOG4CPLUS level. When set to ALL detailed logging will be done.Production should be set to INFO.
LOGLEVEL=INFO
;POS_TRACE when set to 1 will log the pos trace in the log file.
POS_TRACE=0
;POS_OVR is the override name setup in the database.
POS_OVR=DRUGPRCR
; List of error codes we will return price along with
ERROR_CODES=75,60,9G,76,608
;Number of times we should try to reconnect to the service router
ROUTER_RECONNECT=5
;Number of beats we should wait before sending hearbeat message
HEARTBEAT_LIVENESS=10
;Interval between beats
HEARTBEAT_INTERVAL=6000