---
apiVersion: v1
kind: Namespace
metadata:
  name: pos
---
#total namespace quota
apiVersion: v1
kind: ResourceQuota
metadata:
  name: cpu-mem-limit
  namespace: pos
spec:
  hard:
    limits.cpu: 16000m
    limits.memory: 8192M
    requests.cpu: 7000m
    requests.memory: 8192M
---
#individual container defaults
apiVersion: v1
kind: LimitRange
metadata:
  name: cpu-mem-limit
  namespace: pos
spec:
  limits:
  - default:
      cpu: 100m
      memory: 150M
    defaultRequest:
      cpu: 50m
      memory: 125M
    type: Container
---
#default deny network policy
# apiVersion: networking.k8s.io/v1
# kind: NetworkPolicy
# metadata:
  # name: default-deny
  # namespace: pos
# spec:
  # podSelector: {}
---
#bind AD group to the management role
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: oidc:kube_dev_pos
  namespace: pos
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: medimpact:namespace-admin
subjects:
- apiGroup: rbac.authorization.k8s.io
  kind: Group
  name: Kube_dev_pos