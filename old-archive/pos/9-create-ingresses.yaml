apiVersion: extensions/v1beta1
kind: Ingress
metadata:
  annotations:
    kubernetes.io/ingress.class: nginx
  name: k8posdev
  namespace: pos
spec:
  rules:
  - host: k8posdev.medimpact.com
    http:
      paths:
      - backend:
          serviceName: pos-drugpricer-soap
          servicePort: 49202
        path: /
