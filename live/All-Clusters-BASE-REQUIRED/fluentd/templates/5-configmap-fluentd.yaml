  sources.conf: |-
    # Logs from systemd-journal for interesting services.
    <source>
      @type systemd
      @id in_systemd_kubelet
      path /run/log/journal
      matches [{ "_SYSTEMD_UNIT": "kubelet.service" }]
      <storage>
        @type local
        path "#{ENV['FLUENT_POS_PATH'] || '/var/log/fluentd'}-journald-kubelet"
        #path /var/log/fluentd-journald-kubelet
      </storage>
      read_from_head true
      tag kubelet
    </source>
    
    # Logs from containerd-systemd
    <source>
      @type systemd
      @id in_systemd_containerd
      path /run/log/journal
      matches [{ "_SYSTEMD_UNIT": "containerd.service" }]
      <storage>
        @type local
        path "#{ENV['FLUENT_POS_PATH'] || '/var/log/fluentd'}-journald-containerd"
        #path /var/log/fluentd-journald-containerd
      </storage>
      read_from_head true
      tag containerd.systemd
    </source>
    
    # Logs from etcd
    <source>
      @type systemd
      @id in_systemd_etcd
      path /run/log/journal
      matches [{ "_SYSTEMD_UNIT": "etcd.service" }]
      <storage>
        @type local
        path "#{ENV['FLUENT_POS_PATH'] || '/var/log/fluentd'}-journald-etcd"
        #path /var/log/fluentd-journald-etcd
      </storage>
      read_from_head true
      tag etcd
    </source>
    
    Pod logs
    <source>
      @type tail
      @id in_tail_pod_logs
      path /var/log/containers/*.log
      pos_file "#{ENV['FLUENT_POS_PATH'] || '/var/log/fluentd'}-pods.pos"
      # pos_file_compaction_interval 72h
      tag rawpods.*
      read_from_head true
      # format none
      <parse>
        @type "#{ENV['FLUENT_CONTAINER_TAIL_PARSER_TYPE'] || 'none'}"
      </parse>
      time_format %Y-%m-%dT%H:%M:%S.%NZ
    </source>
    
    # Audit logs
    <source>
      @type tail
      @id in_tail_audit_logs
      path /var/log/kubernetes/audit/audit.log
      pos_file "#{ENV['FLUENT_POS_PATH'] || '/var/log/fluentd'}-k8-audit.log.pos"
      #pos_file /var/log/audit.log.pos
      tag kube-apiserver-audit.*
      read_from_head true
      format json
      time_format %Y-%m-%dT%H:%M:%S.%NZ
    </source>
    
