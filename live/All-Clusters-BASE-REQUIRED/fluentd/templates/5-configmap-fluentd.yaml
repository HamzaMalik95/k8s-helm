      key MESSAGE
      # 20240306 105345.043 POSService Transaction
      # multiline_start_regexp /\d{8} \d{6}\.\d{3} POSService Transaction/
      # 070324|07:24:56.456|8892765580.11322.1709825096.455905|INFO    |11322|POSService Transaction
      # multiline_start_regexp /\d{6}\|\d{2}:\d{2}:\d{2}\.\d{3}\|\d+\.\d+\.\d+\.\d+\|INFO    \|\d+\|POSService Transaction/
      # The second to last field is PID. In k8s for internally developed apps this will almost always be 1. If not, change to \d+
