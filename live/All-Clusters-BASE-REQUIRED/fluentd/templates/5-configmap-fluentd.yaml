  kubernetes.conf: |-
    # <match fluent.**>
      # @type null
    # </match>
    <label @FLUENT_LOG>
      <match fluent.**>
        @type null
      </match>
    </label>
    
    <filter kubernetes.**>
      @type kubernetes_metadata
      @id filter_kube_metadata
      watch false
      skip_labels true
      skip_container_metadata true
      skip_master_url true
      skip_namespace_metadata true
    </filter>
    
    
    #######################################################################################
    #######################################################################################
    # The logs from containerd put the podname, the namespace, and the container name in the logfile name
    # The in_tail_log plugin grabs the log filename/path and uses that as the tag, replacing / with .
    # So, let's get k8s records from the resulting tag name: var.log.containers.<important stuff in the 4th part>.log
    
    # Put the 4th tag part into CONTAINER_NAME for later regex parsing
    <filter rawpods.**>
      @type record_transformer
      <record>
        CONTAINER_NAME ${tag_parts[4]}
      </record>
    </filter>
    
    # Use regex to parse the CONTAINER_NAME field, and rewrite the tag (and re-emit the record), using namespace, pod, and container names
    <match rawpods.**>
      @type rewrite_tag_filter
      <rule>
        key CONTAINER_NAME
        pattern ^([^_]+)_([^_]+)_([^_]+)-[a-z0-9]+$
        tag pods.$2.$1.$3
      </rule>
    </match>
    
    # Now take those tags and write fields with important k8s values
    <filter pods.**>
      @type record_transformer
      remove_keys stream
      <record>
        K8S_NAMESPACE ${tag_parts[1]}
        K8S_POD ${tag_parts[2]}
        K8S_CONTAINER ${tag_parts[3]}
        K8S_NODE "#{ENV['K8S_NODE_NAME']}"
        K8S_CLUSTER "#{ENV['K8S_CLUSTER'] || 'undefined'}"
        # MESSAGE ${record["log"]}
      </record>
    </filter>
    #######################################################################################
    #######################################################################################
    
    
    #######################################################################################
    #######################################################################################
    # Add cluster name to audit logs
    <filter kube-apiserver-audit.**>
      @type record_transformer
      <record>
        K8S_CLUSTER "#{ENV['K8S_CLUSTER'] || 'undefined'}"
      </record>
    </filter>
    
    #######################################################################################
    #######################################################################################
    
    
    #######################################################################################
    #######################################################################################
    # Generic filters for overly verbose or unnecessary logs to save splunk costs
    
    # Filter out annoying configmap old resource version messages
    <filter kubelet.**>
      @type grep
      <exclude>
        key MESSAGE
        pattern ConfigMap ended with: too old resource version
      </exclude>
    </filter>
    
    <filter kubelet.**>
      @type grep
      <exclude>
        key MESSAGE
        pattern /I.*ClientConn switching balancer to \"pick_first\"/
      </exclude>
    </filter>
    
    <filter kubelet.**>
      @type grep
      <exclude>
        key MESSAGE
        pattern /I.*parsed scheme: \"\"$/
      </exclude>
    </filter>
    
    <filter kubelet.**>
      @type grep
      <exclude>
        key MESSAGE
        pattern /I.*scheme \"\" not registered, fallback to default scheme$/
      </exclude>
    </filter>
    
    <filter kubelet.**>
      @type grep
      <exclude>
        key MESSAGE
        pattern /I.*ClientConn switching balancer to \"pick_first\"$/
      </exclude>
    </filter>
    
    <filter kubelet.**>
      @type grep
      <exclude>
        key MESSAGE
        pattern /I.*blockingPicker: the picked transport is not ready, loop back to repick$/
      </exclude>
    </filter>
    
    <filter kubelet.**>
      @type grep
      <exclude>
        key MESSAGE
        pattern /I.*ccResolverWrapper: sending update to cc/
      </exclude>
    </filter>
    
    # Always filter fluentd containers just in case
    <filter pods.**>
      @type grep
      <exclude>
        key CONTAINER_NAME
        pattern fluentd
      </exclude>
    </filter>
    
    # Always filter calico because its super verbose
    <filter pods.**>
      @type grep
      <exclude>
        key CONTAINER_NAME
        pattern calico
      </exclude>
    </filter>
    
    # Always filter vsphere-csi-node because its super verbose
    <filter pods.**>
      @type grep
      <exclude>
        key CONTAINER_NAME
        pattern vsphere-csi-node
      </exclude>
    </filter>
    
    # Always filter vsphere csi liveness-probe container
    <filter pods.**>
      @type grep
      <exclude>
        key CONTAINER_NAME
        pattern liveness-probe
      </exclude>
    </filter>
    
    # Always filter pharmacy-search-ws-* because its super verbose
    <filter pods.**>
      @type grep
      <exclude>
        key CONTAINER_NAME
        pattern pharmacy-search-ws
      </exclude>
    </filter>
    
    # Always filter dashboard-metrics-scraper because its super verbose
    <filter pods.**>
      @type grep
      <exclude>
        key CONTAINER_NAME
        pattern dashboard-metrics-scraper
      </exclude>
    </filter>
    
    # Filter out lock and lease messages from csi-attacher/provisioner/resizer components in vmware-system-csi namespace
    <filter pods.vmware-system-csi.**>
      @type grep
      <exclude>
        key MESSAGE
        pattern /(lock is held|failed to acquire lease)/
      </exclude>
    </filter>
    
    # Filter out lock and lease messages from leader elector components in vault namespaces
    <filter pods.{vault-lab,vault-dev,vault-prod}.**>
      @type grep
      <exclude>
        key MESSAGE
        pattern /(lock is held|failed to acquire lease)/
      </exclude>
    </filter>
    
    # Filter out ingress-nginx namespace which is overly verbose
    <filter pods.ingress-nginx.**>
      @type grep
      <exclude>
        key MESSAGE
        pattern .*
      </exclude>
    </filter>
    
    # Temporary filter for sensitive nginx log data message - currently not necessary since the entire namespace is filtered in previous rule
    # <filter pods.ingress-nginx.**>
      # @type grep
      # <exclude>
        # key MESSAGE
        # pattern password=
      # </exclude>
    # </filter>
    
    # Filter out monitoring namespace which is overly verbose
    <filter pods.monitoring.**>
      @type grep
      <exclude>
        key MESSAGE
        pattern .*
      </exclude>
    </filter>
    
    # # Filter out pha-ntwk-* namespaces temporarily
    # <filter pods.{pha-ntwk-dev,pha-ntwk-qa,pha-ntwk-uat,pha-ntwk-prod}.**>
      # @type grep
      # <exclude>
        # key MESSAGE
        # pattern .*
      # </exclude>
    # </filter>
    
    # Filter out itapps-* namespaces temporarily
    <filter pods.{itapps-dev,itapps-qa,itapps-uat,itapps-prod}.**>
      @type grep
      <exclude>
        key MESSAGE
        pattern .*
      </exclude>
    </filter>
    
    # Filter out argocd namespaces temporarily
    #<filter pods.{argocd-lab,argocd-dev,argocd-prod,argocd}.**>
    #  @type grep
    #  <exclude>
    #    key MESSAGE
    #    pattern .*
    #  </exclude>
    #</filter>
    
    # Filter for out kube-probe logs in gravitee
    <filter pods.{gravitee-lab,gravitee-dev,gravitee-prod}.**>
      @type grep
      <exclude>
        key MESSAGE
        pattern kube-probe
      </exclude>
    </filter>
    
    # Filter out this series of overly verbose apiserver info logs
    <filter pods.{kube-system}.**>
      @type grep
      <exclude>
        key MESSAGE
        pattern /ClientConn switching balancer to "pick_first"|parsed scheme: "passthrough"|ccResolverWrapper: sending update to cc:/
      </exclude>
    </filter>
    
    #######################################################################################
    #######################################################################################
    
    # Remove non-essential records
    <filter **>
      @type record_transformer
      remove_keys SYSLOG_FACILITY,_BOOT_ID,_CAP_EFFECTIVE,_CMDLINE,_COMM,_EXE,_GID,_MACHINE_ID,_PID,_STREAM_ID,_SYSTEMD_CGROUP,_SYSTEMD_SLICE,_SYSTEMD_UNIT,_TRANSPORT,_UID
    </filter>
    
