---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: kube-reports
  name: kube-reports
spec:
  replicas: 2
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: kube-reports
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: kube-reports
    spec:
      serviceAccountName: kube-reports-serviceaccount
      containers:
      - image: docker-local.artifactory.medimpact.com/systems/kube-reports:12
        imagePullPolicy: IfNotPresent
        name: kube-reports
        env:
        - name: KUBE_REPORTS_INTERNAL
          value: "true"
        - name: KUBE_REPORTS_WEB_PORT
          value: "8080"
        resources:
          limits:
            cpu: "2000m"
            memory: "400Mi"
          requests:
            cpu: "10m"
            memory: "200Mi"
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /healthcheck
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 1
      securityContext:
        runAsUser: 1337