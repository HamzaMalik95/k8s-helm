# Default values for gatekeeper chart
# This chart deploys OPA Gatekeeper for policy enforcement

# No configuration needed - all resources are deployed as-is
# This chart is designed to be deployment-target agnostic
# The target cluster is determined by kubeconfig context only

# Gatekeeper version: 3.17.0
# Includes:
#   - Custom Resource Definitions (CRDs)
#   - Gatekeeper controller and audit
#   - Mutation policies
#   - ValidatingWebhookConfiguration

# IMPORTANT: Gatekeeper installation requires CRDs to be installed first
# Helm will handle the installation order automatically

# To add new policies:
# 1. Add new YAML files to the templates/ directory
# 2. Run helm upgrade - no code changes required
