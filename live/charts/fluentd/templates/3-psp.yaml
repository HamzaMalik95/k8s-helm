---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: psp:fluentd
  namespace: fluentd
  labels:
rules:
- apiGroups:
  - policy
  resourceNames:
  - privileged
  resources:
  - podsecuritypolicies
  verbs:
  - use
---
# Create RoleBinding for addons just in kube-system namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: psp:fluentd
  namespace: fluentd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: psp:fluentd
subjects:
- kind: ServiceAccount
  name: fluentd
  namespace: fluentd