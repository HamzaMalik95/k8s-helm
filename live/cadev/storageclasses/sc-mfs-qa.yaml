kind: StorageClass
apiVersion: storage.k8s.io/v1
metadata:
  name: mfs-qa
provisioner: csi.vsphere.vmware.com
parameters:
  storagepolicyname: "k8s mfs-qa persistent volumes"  #Optional Parameter
allowedTopologies:
  - matchLabelExpressions:
      - key: topology.kubernetes.io/region
        values:
          - ca
      - key: topology.kubernetes.io/zone
        values:
          - zone-a
          - zone-b