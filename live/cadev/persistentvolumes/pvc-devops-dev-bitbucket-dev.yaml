# Filename pvc-<namespace>-<volume name>.yaml
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: bitbucket-dev
  namespace: devops-dev
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 20Gi
  #storageClassName: nfs
  selector:
    matchLabels:
      volname: devops-dev.bitbucket-dev