apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka-zookeeper
  namespace: pbmp-dev
spec:
  podManagementPolicy: OrderedReady
  replicas: 3
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: kafka-zookeeper
  serviceName: kafka-zookeeper-headless
  template:
    metadata:
      labels:
        app: kafka-zookeeper
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - kafka-zookeeper
            topologyKey: kubernetes.io/hostname
      containers:
      - command:
        - /bin/bash
        - -xec
        - export ZK_DATA_DIR="/var/lib/zookeeper/${ZK_ENV}/${HOSTNAME}/data" && export
          ZK_DATA_LOG_DIR="/var/lib/zookeeper/${ZK_ENV}/${HOSTNAME}/log" && zkGenConfig.sh
          && echo "quorumListenOnAllIPs=true" >> /opt/zookeeper/conf/zoo.cfg  && exec
          zkServer.sh start-foreground
        env:
        - name: ZK_ENV
          value: dev
        - name: ZK_REPLICAS
          value: "3"
        - name: JMXAUTH
          value: "false"
        - name: JMXDISABLE
          value: "false"
        - name: JMXPORT
          value: "1099"
        - name: JMXSSL
          value: "false"
        - name: ZK_CLIENT_PORT
          value: "2181"
        - name: ZK_ELECTION_PORT
          value: "3888"
        - name: ZK_HEAP_SIZE
          value: 1G
        - name: ZK_INIT_LIMIT
          value: "5"
        - name: ZK_LOG_LEVEL
          value: INFO
        - name: ZK_MAX_CLIENT_CNXNS
          value: "60"
        - name: ZK_MAX_SESSION_TIMEOUT
          value: "40000"
        - name: ZK_MIN_SESSION_TIMEOUT
          value: "4000"
        - name: ZK_PURGE_INTERVAL
          value: "0"
        - name: ZK_SERVER_PORT
          value: "2888"
        - name: ZK_SNAP_RETAIN_COUNT
          value: "3"
        - name: ZK_SYNC_LIMIT
          value: "10"
        - name: ZK_TICK_TIME
          value: "2000"
        image: drydock.medimpact.com/sid/medimpact-zookeeper:1.0.0
        imagePullPolicy: IfNotPresent
        livenessProbe:
          exec:
            command:
            - zkOk.sh
            # - sh
            # - -c
            # - if [ "$(echo stat|nc localhost 2181|grep 'not currently serving requests')" ];then exit 1; else exit 0;fi
          failureThreshold: 3
          initialDelaySeconds: 180
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 1
        name: zookeeper
        ports:
        - containerPort: 2181
          name: client
          protocol: TCP
        - containerPort: 3888
          name: election
          protocol: TCP
        - containerPort: 2888
          name: server
          protocol: TCP
        readinessProbe:
          exec:
            command:
            - zkOk.sh
          failureThreshold: 3
          initialDelaySeconds: 20
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 1
        resources:
          limits:
            cpu: "4"
            memory: 2512Mi
          requests:
            cpu: 125m
            memory: 395Mi
        volumeMounts:
        - mountPath: /var/lib/zookeeper
          name: data
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: "itsystems-dev"
        resources:
          requests:
            storage: 1Gi
  updateStrategy:
    type: OnDelete
