---
apiVersion: v1
kind: Namespace
metadata:
  name: vault-lab
  labels:
    istio-injection: disabled
    namespace: vault-lab
---
#total namespace quota
apiVersion: v1
kind: ResourceQuota
metadata:
  name: cpu-mem-limit
  namespace: vault-lab
spec:
  hard:
    limits.cpu: 20000m
    limits.memory: 8G
    requests.cpu: 2000m
    requests.memory: 7G
---
#individual container defaults
apiVersion: v1
kind: LimitRange
metadata:
  name: cpu-mem-limit
  namespace: vault-lab
spec:
  limits:
  - default:
      cpu: 150m
      memory: 125M
    defaultRequest:
      cpu: 50m
      memory: 100M
    type: Container
