# Filename pvc-<namespace>-<volume name>.yaml
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rad-qa
  namespace: medadjust-uat
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 6.5Gi
  # storageClassName: nfs
  selector:
    matchLabels:
      volname: medadjust-uat.rad-qa