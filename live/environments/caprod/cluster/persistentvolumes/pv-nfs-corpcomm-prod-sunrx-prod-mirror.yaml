# Filename: pv-<storage type>-<namespace>-<volume name>.yaml
apiVersion: v1
kind: PersistentVolume
metadata:
  name: nfs.corpcomm-prod.sunrx-prod-mirror
  labels: 
    volname: corpcomm-prod.sunrx-prod-mirror
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteMany
  mountOptions:
    - rsize=8192
