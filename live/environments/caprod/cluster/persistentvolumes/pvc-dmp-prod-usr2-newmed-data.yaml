# Filename pvc-<namespace>-<volume name>.yaml
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: usr2-newmed-data
  namespace: dmp-prod
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 28Gi
  # storageClassName: nfs
  selector:
    matchLabels:
      volname: dmp-prod.qtree-newmed-data