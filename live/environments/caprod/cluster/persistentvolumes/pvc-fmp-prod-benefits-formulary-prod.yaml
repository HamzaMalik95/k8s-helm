# Filename pvc-<namespace>-<volume name>.yaml
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: benefits-formulary-prod
  namespace: fmp-prod
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 20Gi
  # storageClassName: nfs
  selector:
    matchLabels:
      volname: fmp-prod.benefits-formulary-prod