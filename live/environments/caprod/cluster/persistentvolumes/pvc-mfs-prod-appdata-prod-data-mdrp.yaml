# Filename pvc-<namespace>-<volume name>.yaml
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: appdata-prod-data-mdrp
  namespace: mfs-prod
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 1000Gi
  # storageClassName: nfs
  selector:
    matchLabels:
      volname: mfs-prod.appdata-prod-data-mdrp
