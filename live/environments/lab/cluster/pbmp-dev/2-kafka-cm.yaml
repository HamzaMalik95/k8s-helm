apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-server-secrets-config
  namespace: pbmp-dev
binaryData:
  kafka.broker.keystore.jks: 
  kafka.broker.truststore.jks: 
  kafka.consumer.keystore.jks: 
  kafka.consumer.truststore.jks: 
  kafka.producer.keystore.jks: 
  kafka.producer.truststore.jks: 
data:
  broker_keystore_creds: |
    ServerP@ss2
  broker_sslkey_creds: |
    ServerP@ss2
  broker_truststore_creds: |
    ServerP@ss2
  host.consumer.ssl.config: "group.id=ssl-host\nssl.truststore.location=/etc/kafka/secrets/kafka.consumer.truststore.jks\nssl.truststore.password=ClientP@ss3\n\nssl.keystore.location=/etc/kafka/secrets/kafka.consumer.keystore.jks\nssl.keystore.password=ClientP@ss3\n\nssl.key.password=ClientP@ss3\nssl.endpoint.identification.algorithm=
    \n\nsecurity.protocol=SSL\n"
  host.producer.ssl.config: "ssl.truststore.location=/etc/kafka/secrets/kafka.producer.truststore.jks\nssl.truststore.password=ClientP@ss3\n\nssl.keystore.location=/etc/kafka/secrets/kafka.producer.keystore.jks\nssl.keystore.password=ClientP@ss3\n\nssl.key.password=ClientP@ss3\nssl.endpoint.identification.algorithm=
    \n\nsecurity.protocol=SSL\n"
