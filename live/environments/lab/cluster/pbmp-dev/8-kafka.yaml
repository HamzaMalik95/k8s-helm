apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app: kafka
  name: kafka
  namespace: pbmp-dev
spec:
  podManagementPolicy: OrderedReady
  replicas: 3
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: kafka
  serviceName: kafka-headless
  template:
    metadata:
      labels:
        app: kafka
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - kafka
            topologyKey: kubernetes.io/hostname
      containers:
      - command:
        - sh
        - -exc
        - |
          if [ -e /opt/kafka/data/logs/lost+found ]; then \
            rm -rf /opt/kafka/data/logs/*; \
          fi; \
          unset KAFKA_PORT && \
          export KAFKA_BROKER_ID=${HOSTNAME##*-} && \
          export KAFKA_ADVERTISED_LISTENERS=SSL://${POD_IP}:9092 && \
          exec /etc/confluent/docker/run
        env:
        - name: POD_IP
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: status.podIP
        - name: KAFKA_HEAP_OPTS
          value: -Xmx1G -Xms1G
        - name: KAFKA_ZOOKEEPER_CONNECT
          value: kafka-zookeeper:2181
        - name: KAFKA_SSL_KEYSTORE_FILENAME
          value: kafka.broker.keystore.jks
        - name: KAFKA_SSL_KEYSTORE_CREDENTIALS
          value: broker_keystore_creds
        - name: KAFKA_SSL_KEY_CREDENTIALS
          value: broker_sslkey_creds
        - name: KAFKA_SSL_TRUSTSTORE_FILENAME
          value: kafka.broker.truststore.jks
        - name: KAFKA_SSL_TRUSTSTORE_CREDENTIALS
          value: broker_truststore_creds
        - name: KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM
          value: ' '
        - name: KAFKA_SSL_CLIENT_AUTH
          value: requested
        - name: KAFKA_SECURITY_INTER_BROKER_PROTOCOL
          value: SSL
        - name: KAFKA_LOG_DIRS
          value: /opt/kafka/data/logs
        - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
          value: "3"
        - name: KAFKA_JMX_PORT
          value: "5555"
        - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
          value: "false"
        image: docker-local.artifactory.medimpact.com/com/medimpact/pbmp/medimpact-kafka:1.0
        imagePullPolicy: IfNotPresent
        livenessProbe:
          exec:
            command:
            - sh
            - -ec
            - ps -ef | /bin/grep -q SupportedKafka
          failureThreshold: 3
          initialDelaySeconds: 30
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 5
        name: kafka-broker
        ports:
        - containerPort: 9092
          name: kafka
          protocol: TCP
        readinessProbe:
          failureThreshold: 3
          initialDelaySeconds: 30
          periodSeconds: 10
          successThreshold: 1
          tcpSocket:
            port: kafka
          timeoutSeconds: 5
        resources:
          limits:
            cpu: "4"
            memory: 2512Mi
          requests:
            cpu: 125m
            memory: 395Mi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /etc/kafka/secrets
          name: kafka-server-secrets-volume
        - mountPath: /opt/kafka/data/logs
          name: logs
      securityContext:
        fsGroup: 70501
        runAsUser: 70501
      volumes:
      - configMap:
          defaultMode: 420
          name: kafka-server-secrets-config
        name: kafka-server-secrets-volume
  volumeClaimTemplates:
    - metadata:
        name: logs
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: "itsystems-dev"
        resources:
          requests:
            storage: 50Gi
  updateStrategy:
    type: RollingUpdate
