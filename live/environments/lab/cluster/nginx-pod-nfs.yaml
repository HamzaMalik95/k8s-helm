---
kind: Pod
apiVersion: v1
metadata:
  name: nginx-nfs
  namespace: itsystems-lab
spec:
  nodeSelector:
    "kubernetes.io/os": linux
  securityContext:
    runAsUser: 1001
  containers:
    - image:  drydock.medimpact.com/busybox
      name: nginx-nfs
      command:
        - "/bin/sh"
        - "-c"
        - "sleep 3600"
      volumeMounts:
        - name: persistent-storage
          mountPath: "/mnt/nfs"
          readOnly: false
  volumes:
    - name: persistent-storage
      persistentVolumeClaim:
        claimName: pvc-nfs-csi-itsystems-lab