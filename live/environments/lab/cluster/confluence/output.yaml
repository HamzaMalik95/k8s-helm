# Source: confluence/templates/tests/test-application-status.yaml
apiVersion: v1
kind: Pod
metadata:
  name: "RELEASE-NAME-confluence-application-status-test"
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": "before-hook-creation,hook-succeeded"
    
  labels:
    helm.sh/chart: confluence-1.5.1
    app.kubernetes.io/name: confluence
    app.kubernetes.io/instance: RELEASE-NAME
    app.kubernetes.io/version: "7.19.0"
    app.kubernetes.io/managed-by: Helm
    
spec:
  containers:
    - name: test
      image: alpine
      env:
        - name: STATUS_URL
          value: "http://RELEASE-NAME-confluence:80/status"
      command:
        - /bin/sh
        - -ec
        - |
          apk add -q jq curl
          STATUS=$(curl -s "$STATUS_URL")
          echo "Verifying application state is RUNNING or FIRST_RUN: $STATUS"
          echo $STATUS | jq -e '.state|test("RUNNING|FIRST_RUN")'
  restartPolicy: Never
---
# Source: confluence/templates/tests/test-database-connectivity.yaml
apiVersion: v1
kind: Pod
metadata:
  name: "RELEASE-NAME-confluence-db-connectivity-test"
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": "before-hook-creation,hook-succeeded"
    
  labels:
    helm.sh/chart: confluence-1.5.1
    app.kubernetes.io/name: confluence
    app.kubernetes.io/instance: RELEASE-NAME
    app.kubernetes.io/version: "7.19.0"
    app.kubernetes.io/managed-by: Helm
    
spec:
  serviceAccountName: RELEASE-NAME-confluence
  volumes:
    
    - name: shared-home
    
      persistentVolumeClaim:
        claimName: sharedvol
    
  containers:
    - name: test
      image: "docker-local.artifactory.medimpact.com/itapps/confluence:latest:7.19.0"
      imagePullPolicy: IfNotPresent
      volumeMounts:
        
      env:
        - name: JDBC_TYPE
          value: "postgresql"
        - name: JDBC_URL
          value: "jdbc:postgresql://confluence-postgres:5432/confluence"
        - name: JDBC_USER
          valueFrom:
            secretKeyRef:
              name: confluence-creds
              key: username
        - name: JDBC_PASSWORD
          valueFrom:
            secretKeyRef:
              name: confluence-creds
              key: password
        - name: CLASSPATH
          value: "/opt/atlassian/confluence/confluence/WEB-INF/lib/*"
      command:
        - /bin/bash
        - -ec
        - |
          cat <<EOF | jshell - > output.txt
          var jdbcUrl = System.getenv("JDBC_URL");
          var jdbcUsername = System.getenv("JDBC_USER");
          var jdbcPassword = System.getenv("JDBC_PASSWORD");

          System.out.println("Establishing connection to " + jdbcUrl);
          try (var c = java.sql.DriverManager.getConnection(jdbcUrl, jdbcUsername, jdbcPassword)) {
             System.out.println("Connection established OK, " + c.getClass());
          }
          EOF
          cat output.txt
          grep -q "Connection established OK" output.txt
  restartPolicy: Never
