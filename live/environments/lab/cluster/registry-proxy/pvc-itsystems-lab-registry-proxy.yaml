# Filename pvc-<namespace>-<volume name>.yaml
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: registry-proxy
  namespace: itsystems-lab
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 50Gi
  # storageClassName: nfs
  selector:
    matchLabels:
      volname: itsystems-lab.registry-proxy