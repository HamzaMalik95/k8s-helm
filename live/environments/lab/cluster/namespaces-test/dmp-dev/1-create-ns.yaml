---
apiVersion: v1
kind: Namespace
metadata:
  labels:
    istio-injection: enabled
    namespace: dmp-dev
  name: dmp-dev
---
#bind AD group to the management role
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: oidc:kube_dev_dmp-dev
  namespace: dmp-dev
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: medimpact:namespace-admin
subjects:
- apiGroup: rbac.authorization.k8s.io
  kind: Group
  name: Kube_dev_dmp-dev