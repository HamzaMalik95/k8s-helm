---
apiVersion: v1
kind: Namespace
metadata:
  labels:
    istio-injection: enabled
    namespace: pbmp-dev
  name: pbmp
---
#total namespace quota
apiVersion: v1
kind: ResourceQuota
metadata:
  name: cpu-mem-limit
  namespace: pbmp-dev
spec:
  hard:
    limits.cpu: "20"
    limits.memory: 15G
    requests.cpu: "5"
    requests.memory: 14G
---
#individual container defaults
apiVersion: v1
kind: LimitRange
metadata:
  name: cpu-mem-limit
  namespace: pbmp-dev
spec:
  limits:
  - default:
      cpu: 150m
      memory: 125M
    defaultRequest:
      cpu: 50m
      memory: 100M
    type: Container
---
#default deny network policy
# apiVersion: networking.k8s.io/v1
# kind: NetworkPolicy
# metadata:
  # name: default-deny
  # namespace: pbmp-dev
# spec:
  # podSelector: {}
---
#bind AD group to the management role
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: oidc:kube_dev_pbmp
  namespace: pbmp-dev
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: medimpact:namespace-admin
subjects:
- apiGroup: rbac.authorization.k8s.io
  kind: Group
  name: Kube_dev_pbmp-dev