---
# Service account for restarting deployments
apiVersion: v1
kind: ServiceAccount
metadata:
  name: restarter
  namespace: dmp-qa
---
# Role allows an account to do a deployment "rollout restart"
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: restarter
  namespace: dmp-qa
rules:
 - apiGroups: ["apps"]
   resources: ["deployments"]
   verbs: ["get", "list", "watch", "patch"]
---
#bind power-users AD group to the management role
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: restarter
  namespace: dmp-qa
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: restarter
subjects:
  - kind: ServiceAccount
    name: restarter