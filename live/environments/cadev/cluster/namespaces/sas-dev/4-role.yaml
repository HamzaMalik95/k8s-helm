# Create namespace admins cluster role
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: AdditionalResources
  namespace: sas-dev
rules:
- apiGroups:
  - '*'
  resources:
  - casdeployments
  - crunchybridgeclusters
  - dataservers
  - distributedredisclusters
  - opendistroclusters
  - pgadmins
  - pgupgrades
  - postgresclusters
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
  - deletecollection
---
#bind AD group to the management role
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: oidc:kube_dev_sas-dev:AdditionalResources
  namespace: sas-dev
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: AdditionalResources
subjects:
- apiGroup: rbac.authorization.k8s.io
  kind: Group
  name: Kube_dev_sas-dev