apiVersion: v1
kind: PersistentVolume
metadata:
  name: nfs-pbmp-dev-pv2medvfiler1-file-mgmt2-formulary-extract
  # annotations:
    # volume.beta.kubernetes.io/mount-options: rsize=8192,wsize=8192,timeo=14,intr,vers=3
  labels: 
    volname: nfs-pbmp-dev-pv2medvfiler1-file-mgmt2-formulary-extract
spec:
  capacity:
    storage: 25Gi
  accessModes:
    - ReadWriteMany
  mountOptions:
    - rsize=8192
    - wsize=8192
    - timeo=14
    - intr
    - vers=3
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs
  nfs:
    server: 10.15.130.94
    path: "/vol_pv2medvfiler1_file_mgmt2/formulary_extract"