apiVersion: v1
kind: PersistentVolume
metadata:
  name: nfs-medresponse-dev-pv1medvfiler3-pafa-dev
  # annotations:
    # volume.beta.kubernetes.io/mount-options: rsize=8192,wsize=8192,timeo=14,intr,vers=3
  labels: 
    volname: medresponse-dev-pv1medvfiler3-pafa-dev
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteMany
  mountOptions:
    - rsize=8192
    - wsize=8192
