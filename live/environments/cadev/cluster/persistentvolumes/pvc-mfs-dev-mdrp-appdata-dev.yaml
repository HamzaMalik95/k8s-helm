# Filename pvc-<namespace>-<volume name>.yaml
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mdrp-appdata
  namespace: mfs-dev
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 800Gi
  # storageClassName: nfs
  selector:
    matchLabels:
      volname: mfs-dev.mdrp-appdata
