# Filename pvc-<namespace>-<volume name>.yaml
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: appdata-dev-qa-data
  namespace: dmp-qa
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 700Gi
  # storageClassName: nfs
  selector:
    matchLabels:
      volname: dmp-qa.appdata-dev-qa-data