# Filename pvc-<namespace>-<volume name>.yaml
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: appdata-dev-qa-rarch
  namespace: fmp-qa
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 700Gi
  # storageClassName: nfs
  selector:
    matchLabels:
      volname: fmp-qa.appdata-dev-qa-rarch