# Filename pvc-<namespace>-<volume name>.yaml
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rad-dev
  namespace: medadjust-dev
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 200Mi
  # storageClassName: nfs
  selector:
    matchLabels:
      volname: medadjust-dev.rad-dev