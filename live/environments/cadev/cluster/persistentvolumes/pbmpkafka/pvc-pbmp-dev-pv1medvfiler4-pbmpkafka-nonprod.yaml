apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pbmpkafka-nonprod
  namespace: pbmp-dev
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 5Gi
  storageClassName: nfs
  selector:
    matchLabels:
      volname: nfs-pbmp-dev-pv1medvfiler4-pbmpkafka-nonprod