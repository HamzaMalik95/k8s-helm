# Filename pvc-<namespace>-<volume name>.yaml
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: benefits-formulary-dev
  namespace: fmp-pp
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 100Gi
  # storageClassName: nfs
  selector:
    matchLabels:
      volname: fmp-pp.benefits-formulary-dev