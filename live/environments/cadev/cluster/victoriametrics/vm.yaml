# Source: victoria-metrics-cluster/templates/vmstorage-statefulset.yaml
apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app: vmstorage
    app.kubernetes.io/name: victoria-metrics-cluster
    app.kubernetes.io/instance: victoria-metrics
    helm.sh/chart: victoria-metrics-cluster-0.9.29
    app.kubernetes.io/managed-by: Helm
  name: victoria-metricscluster-vmstorage
  namespace: victoriametrics
spec:
  serviceName: victoria-metricscluster-vmstorage
  selector:
    matchLabels:
      app: vmstorage
      app.kubernetes.io/name: victoria-metrics-cluster
      app.kubernetes.io/instance: victoria-metrics
  replicas: 5
  podManagementPolicy: OrderedReady
  template:
    metadata:
      labels:
        app: vmstorage
        app.kubernetes.io/name: victoria-metrics-cluster
        app.kubernetes.io/instance: victoria-metrics
        helm.sh/chart: victoria-metrics-cluster-0.9.29
        app.kubernetes.io/managed-by: Helm
    spec:
      automountServiceAccountToken: true
      containers:
        - name: victoria-metrics-cluster-vmstorage
          # image: "victoriametrics/vmstorage:v1.77.2-cluster"
          # image: "victoriametrics/vmstorage:v1.78.1-cluster"
          image: "docker-local.artifactory.medimpact.com/dockerhub/victoriametrics/vmstorage:v1.85.1-cluster"
          imagePullPolicy: "IfNotPresent"
          securityContext:
            runAsUser: 8480
            fsGroup: 8480
          args:
            - "-storage.minFreeDiskSpaceBytes=20GB"
            - "-dedup.minScrapeInterval=10s"
            - "--retentionPeriod=30d"
            - "--storageDataPath=/storage"
            - --envflag.enable=true
            - --envflag.prefix=VM_
            - --loggerFormat=json
          ports:
            - name: http
              containerPort: 8482
            - name: vminsert
              containerPort: 8400
            - name: vmselect
              containerPort: 8401
          livenessProbe:
            failureThreshold: 10
            initialDelaySeconds: 30
            periodSeconds: 30
            tcpSocket:
              port: http
            timeoutSeconds: 5
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 5
          resources: 
            limits:
              cpu: 4000m
          volumeMounts:
            - name: vmstorage-volume
              mountPath: /storage
              subPath: 
      serviceAccountName: victoria-metricscluster
      terminationGracePeriodSeconds: 60
  volumeClaimTemplates:
  - metadata:
      name: vmstorage-volume
    spec:
      storageClassName: itsystems-dev
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 200Gi
