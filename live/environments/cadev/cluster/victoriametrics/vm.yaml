# Source: victoria-metrics-cluster/templates/vmselect-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: vmselect
    app.kubernetes.io/name: victoria-metrics-cluster
    app.kubernetes.io/instance: victoria-metrics
    helm.sh/chart: victoria-metrics-cluster-0.9.29
    app.kubernetes.io/managed-by: Helm
  name: victoria-metricscluster-vmselect
  namespace: victoriametrics
spec:
  selector:
    matchLabels:
      app: vmselect
      app.kubernetes.io/name: victoria-metrics-cluster
      app.kubernetes.io/instance: victoria-metrics
  replicas: 3
  template:
    metadata:
      labels:
        app: vmselect
        app.kubernetes.io/name: victoria-metrics-cluster
        app.kubernetes.io/instance: victoria-metrics
        helm.sh/chart: victoria-metrics-cluster-0.9.29
        app.kubernetes.io/managed-by: Helm
    spec:
      automountServiceAccountToken: true
      containers:
        - name: victoria-metrics-cluster-vmselect
          # image: "victoriametrics/vmselect:v1.77.2-cluster"
          # image: "victoriametrics/vmselect:v1.78.1-cluster"
          image: "docker-local.artifactory.medimpact.com/dockerhub/victoriametrics/vmselect:v1.85.1-cluster"
          imagePullPolicy: "IfNotPresent"
          securityContext:
            runAsUser: 8480
          args:
            - "-search.minStalenessInterval=1m"
            - "-search.maxSamplesPerQuery=2000000000"
            - "-dedup.minScrapeInterval=10s"
            - "--cacheDataPath=/cache"
            - --storageNode=victoria-metricscluster-vmstorage-0.victoria-metricscluster-vmstorage.victoriametrics.svc.cluster.local:8401
            - --storageNode=victoria-metricscluster-vmstorage-1.victoria-metricscluster-vmstorage.victoriametrics.svc.cluster.local:8401
            - --storageNode=victoria-metricscluster-vmstorage-2.victoria-metricscluster-vmstorage.victoriametrics.svc.cluster.local:8401
            - --storageNode=victoria-metricscluster-vmstorage-3.victoria-metricscluster-vmstorage.victoriametrics.svc.cluster.local:8401
            - --storageNode=victoria-metricscluster-vmstorage-4.victoria-metricscluster-vmstorage.victoriametrics.svc.cluster.local:8401
            
            - --envflag.enable=true
            - --envflag.prefix=VM_
            - --loggerFormat=json
          ports:
            - name: http
              containerPort: 8481
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - mountPath: /cache
              name: cache-volume
          resources:
      serviceAccountName: victoria-metricscluster
      volumes:
        - name: cache-volume
          emptyDir: {}
