---
#total namespace quota
apiVersion: v1
kind: ResourceQuota
metadata:
  name: cpu-mem-limit
  namespace: mynamespace
spec:
  hard:
    limits.cpu: 2000m
    limits.memory: 2Gi
    requests.cpu: 1000m
    requests.memory: 2Gi
---
#individual container defaults
apiVersion: v1
kind: LimitRange
metadata:
  name: cpu-mem-limit
  namespace: mynamespace
spec:
  limits:
  - default:
      cpu: 200m
      memory: 200Mi
    defaultRequest:
      cpu: 50m
      memory: 100Mi
    type: Container
---
#deny traffic from other namespaces
#apiVersion: networking.k8s.io/v1beta1
#kind: NetworkPolicy
#metadata:
#  name: default-deny-from-other-ns
#  namespace: mynamespace
#spec:
#  podSelector:
#    matchLabels:
#  ingress:
#  - from:
#    - podSelector: {}
---
#bind AD group to the management role
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: namespace-owner
  namespace: mynamespace
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: medimpact:namespace-admin
subjects:
- apiGroup: rbac.authorization.k8s.io
  kind: User
  name: oidc:namespace-owner
